<!DOCTYPE html>
<html>
<head>

<title>DIY Schedule</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffb6c1">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DIY Schedule">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">

  
<style>
*{box-sizing:border-box;font-family:system-ui;}
body{margin:0;background:#ffb6c1;}

#splash{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#ffb6c1;display:flex;align-items:center;justify-content:center;
z-index:9999;text-align:center;
}

.splashText{font-family:cursive;color:#1f2a44;}
.line1{font-size:34px;font-weight:700;}
.line2{font-size:18px;margin-top:6px;}
.line3{font-size:28px;margin-top:6px;font-weight:600;}

.typewriter{
border-right:3px solid #1f2a44;
white-space:nowrap;
overflow:hidden;
width:0;
display:inline-block;
animation:typing 2s steps(12,end) forwards, blink .7s infinite;
}

.header{
text-align:center;
font-weight:1000;
font-family:cursive;
margin-bottom:20px;
font-size: clamp(40px, 15vw, 60px);
color:#1f2a44;
}

.container{max-width:1000px;margin:auto;padding:20px;}

@keyframes typing{from{width:0}to{width:160px}}
@keyframes blink{50%{border-color:transparent}}

/* UPDATED CARD */
.doc{
background:white;
padding:18px;
border-radius:16px;
margin-top:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
position:relative;
transition:0.25s;
display:flex;
gap:14px;
align-items:flex-start;
overflow:hidden;
}

/* TEXT STRUCTURE */
.doc .info{
flex:1;
line-height:1.4;
}
  
input[type="time"]{
height:40px;
padding:6px;
font-size:14px;
}

.doc .name{
font-size:20px;
font-weight:700;
color:#1f2a44;
}

.doc .category{
font-size:13px;
color:#666;
margin-bottom:6px;
}

.doc .hospital{
margin-top:8px;
font-size:14px;
}

/* SWIPE ACTION BUTTONS */
.iconBtn{
position:absolute;
top:0;
right:-90px;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
gap:10px;
transition:0.3s;
}

.doc.show-actions .iconBtn{
right:10px;
}

.iconBtn button{
width:38px;
height:38px;
border-radius:50%;
padding:0;
font-size:16px;
}

/* OTHER UI */
.card{
background:white;
padding:16px;
border-radius:14px;
margin-top:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

label{
font-size:13px;
font-weight:600;
color:#1f2a44;
display:block;
margin-top:10px;
}

input,select,button{
width:100%;
height:46px;
padding:10px;
margin-top:5px;
border-radius:10px;
border:1px solid #ddd;
}

button{
background:linear-gradient(135deg,#1f2a44,#2c3e50);
color:white;
font-weight:600;
cursor:pointer;
border:none;
transition:0.2s;
}

button:hover{
opacity:0.9;
transform:scale(1.02);
}

.tabs{display:flex;gap:10px;}
.tabs button{flex:1;}

.badge{
background:#1f2a44;
color:white;
padding:4px 10px;
border-radius:999px;
font-size:12px;
display:inline-block;
margin-bottom:8px;
}

.actionBtns{margin-top:10px;}
</style>

</head>

<body>
  
<div id="authBox" class="card" style="margin:20px;">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>
  

<div id="imgModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:9999;justify-content:center;align-items:center;">
<img id="modalImg" style="max-width:90%;max-height:90%;border-radius:12px;">
</div>

<div id="splash">
<div class="splashText">
<div class="line1">DIY Schedule</div>
<div class="line2">Made for</div>
<div class="line3 typewriter">Jiciel</div>
</div>
</div>

<div class="container" id="app" style="display:none">

<div class="header">DIY Schedule</div>

<div class="tabs">
<button onclick="showTab('add')">Add</button>
<button onclick="showTab('search')">Search</button>
<button onclick="showTab('view')">View</button>
</div>

<div id="hospitalManager" class="card">
<h3>Hospital Manager</h3>
<label>Hospital Name</label>
<input id="newHospital">
<button onclick="addHospital()">➕ Add Hospital</button>
<div id="hospitalList"></div>
</div>

<div id="add" class="card">

<label>Name</label>
<input id="name">

<label>Category</label>
<input id="category">

<label>Profile Picture</label>
<input type="file" id="profilePic" accept="image/*">

<label>Hospital</label>
<select id="hospitalSelect"></select>

<button onclick="addHospitalToDoctor()">➕ Add Hospital Schedule</button>

<div id="tempSchedules"></div>

<button onclick="saveDoctor()">💾 Save Doctor</button>
<button onclick="cancelEdit()" style="background:#777;">❌ Cancel</button>

</div>

<!-- ONLY showing the UPDATED parts to avoid breaking your long code -->

<!-- ================= SEARCH TAB (UPDATED) ================= -->
<div id="search" class="card" style="display:none">

<label>Name</label>
<input id="searchName" oninput="liveSearch()">

<label>Category</label>
<input id="searchCategory" oninput="liveSearch()">

<label>Hospital</label>
<select id="searchHospital" onchange="searchDoctors()"></select>

<label>Day</label>
<select id="searchDay" onchange="searchDoctors()">
<option value="">All Days</option>
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
<option>Sunday</option>
</select>

<!-- ❌ REMOVE BUTTON (optional) -->
<!-- <button onclick="searchDoctors()">Search</button> -->

<div id="results"></div>
</div>
<div id="view" class="card" style="display:none">

<label>Select Day</label>
<select id="viewDay" onchange="renderView()">
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
<option>Sunday</option>
</select>

<div class="actionBtns">
<button onclick="openFullReport()">📄 View Full Report</button>
</div>

<div id="viewBox"></div>

</div>

</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCx6mKRI61Spn2YExdV1TG7BK2tORhjKlE",
  authDomain: "diys-59433.firebaseapp.com",
  projectId: "diys-59433",
  storageBucket: "diys-59433.firebasestorage.app",
  messagingSenderId: "974740858123",
  appId: "1:974740858123:web:a10a681ff93b800bfc6e0e"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// Enable offline mode
db.enablePersistence().catch((err)=>{
console.log("Offline error:", err);
});
const days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

let doctors=JSON.parse(localStorage.getItem("doctors")||"[]");
let hospitals=JSON.parse(localStorage.getItem("hospitals")||"[]");

let editIndex=null;
let tempSchedules=[];

function save(){
let user = auth.currentUser;
if(!user) return;

db.collection("users").doc(user.uid).set({
doctors,
hospitals
});
}

window.onload=()=>{
loadHospitals();
loadSearchHospitals();

// app hidden until login
document.getElementById("app").style.display="none";

setTimeout(()=>{
document.getElementById("splash").style.display="none";
},2000);
};
  
  
  
function loadFromCloud(){
let user = auth.currentUser;
if(!user) return;

db.collection("users").doc(user.uid)
.onSnapshot(doc=>{
if(doc.exists){
let data = doc.data();
doctors = data.doctors || [];
hospitals = data.hospitals || [];

renderView();
searchDoctors();
loadHospitals();
loadSearchHospitals();
}
});
}
  
function isValidEmail(email){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function login(){
let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value;

if(!isValidEmail(email)){
return alert("Please enter a valid email (example@gmail.com)");
}

auth.signInWithEmailAndPassword(email,password)
.then(()=>alert("Logged in!"))
.catch(e=>alert(e.message));
}

function register(){
let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value;

if(!isValidEmail(email)){
return alert("Please enter a valid email (example@gmail.com)");
}

if(password.length < 6){
return alert("Password must be at least 6 characters");
}

auth.createUserWithEmailAndPassword(email,password)
.then(()=>alert("Registered!"))
.catch(e=>alert(e.message));
}
auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("authBox").style.display="none";
document.getElementById("app").style.display="block";

loadFromCloud();
}else{
document.getElementById("authBox").style.display="block";
document.getElementById("app").style.display="none";
}
});
  
function showTab(tab){
document.getElementById("add").style.display=tab==="add"?"block":"none";
document.getElementById("search").style.display=tab==="search"?"block":"none";
document.getElementById("view").style.display=tab==="view"?"block":"none";
document.getElementById("hospitalManager").style.display=tab==="add"?"block":"none";

if(tab==="add") loadHospitals();

if(tab==="search"){
loadSearchHospitals();
searchDoctors(); // 🔥 auto show results
}

if(tab==="view") renderView();
}
  let searchTimeout;

function liveSearch(){
clearTimeout(searchTimeout);
searchTimeout = setTimeout(searchDoctors, 300);
}
  

/* ================= HOSPITAL ================= */

function addHospital(){
let name=document.getElementById("newHospital").value.trim();
if(!name) return;
if(hospitals.includes(name)) return alert("Exists");

hospitals.push(name);
save();

document.getElementById("newHospital").value="";
alert("Saved!");

loadHospitals();
loadSearchHospitals();
}

function loadHospitals(){
let sel=document.getElementById("hospitalSelect");
let sorted=[...hospitals].sort((a,b)=>a.toLowerCase().localeCompare(b.toLowerCase()));

sel.innerHTML="<option value=''>Select Hospital</option>";
sorted.forEach(h=>sel.innerHTML+=`<option>${h}</option>`);
}

function loadSearchHospitals(){
let sel=document.getElementById("searchHospital");
let sorted=[...hospitals].sort((a,b)=>a.toLowerCase().localeCompare(b.toLowerCase()));

sel.innerHTML="<option value=''>All Hospitals</option>";
sorted.forEach(h=>sel.innerHTML+=`<option value="${h.toLowerCase()}">${h}</option>`);
}

/* ================= SCHEDULE BUILDER ================= */

function addHospitalToDoctor(){
let hospital=document.getElementById("hospitalSelect").value;
if(!hospital) return alert("Select hospital");

// prevent duplicate hospital entry
if(tempSchedules.some(h=>h.name===hospital)){
return alert("Hospital already added");
}

// create empty schedule first
let schedule={};

// create inputs UI dynamically
let builderHTML = `
<div class="card">
<b>${hospital}</b>
<div style="margin-top:10px;">
${days.map(day=>`
<div style="display:flex;justify-content:space-between;margin-bottom:6px;">
    
<span style="width:90px;">${day}</span>
<input type="time" id="start_${day}" style="width:45%;">
<input type="time" id="end_${day}" style="width:45%;">
</div>
`).join("")}
</div>

<button onclick="saveTempSchedule('${hospital}')">✅ Save Schedule</button>
</div>
`;

document.getElementById("tempSchedules").innerHTML = builderHTML;
}
function renderTempSchedules(){
let box=document.getElementById("tempSchedules");

box.innerHTML=tempSchedules.map((h,i)=>`
<div class="card">

<div style="display:flex;justify-content:space-between;align-items:center;">
<b>🏥 ${h.name}</b>
<button onclick="removeHospital(${i})" 
style="background:#e74c3c;width:auto;padding:6px 10px;font-size:12px;">
🗑 Remove
</button>
</div>

${days.map(day=>{
let val=h.schedule[day] || "";
let start="", end="";

if(val.includes("-")){
let parts=val.split(" - ");
start=convertTo24(parts[0]);
end=convertTo24(parts[1]);
}

return `
<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
<div style="width:90px;">${day}</div>

<input type="time" id="start_${i}_${day}" value="${start}" style="flex:1;">
<span style="font-size:12px;">to</span>
<input type="time" id="end_${i}_${day}" value="${end}" style="flex:1;">
</div>
`;
}).join("")}

<button onclick="saveEditedSchedule(${i})" style="margin-top:8px;">
💾 Save Schedule
</button>

</div>
`).join("");
}function removeHospital(index){

if(!confirm("Remove this hospital schedule?")) return;

// remove from tempSchedules only
tempSchedules.splice(index,1);

// refresh UI
renderTempSchedules();
}
  
  //save function  
function saveEditedSchedule(index){

let updatedSchedule={};

days.forEach(day=>{
let start=document.getElementById(`start_${index}_${day}`).value;
let end=document.getElementById(`end_${index}_${day}`).value;

if(start && end){
updatedSchedule[day]=formatTime(start)+" - "+formatTime(end);
}
});

// prevent empty save
if(Object.keys(updatedSchedule).length===0){
return alert("No schedule entered");
}

// overwrite only this hospital schedule
tempSchedules[index].schedule = updatedSchedule;

alert("Schedule updated!");

renderTempSchedules();
}
/* ================= SAVE + EDIT ================= */

function updateSchedule(index, day, value, type){

let sched=tempSchedules[index].schedule[day] || "";

let start="", end="";

if(sched.includes("-")){
let parts=sched.split(" - ");
start=parts[0];
end=parts[1];
}

// convert input to formatted time
let formatted=formatTime(value);

if(type==="start") start=formatted;
if(type==="end") end=formatted;

// if both exist → save
if(start && end){
tempSchedules[index].schedule[day]=`${start} - ${end}`;
}else{
tempSchedules[index].schedule[day]="";
}
}
    
function saveDoctor(){
let name=document.getElementById("name").value.trim();
if(!name) return alert("Name required");

let category=document.getElementById("category").value;
let file=document.getElementById("profilePic").files[0];

function finalize(photo){

let doctor={
name,
category,
photo: photo || (editIndex!==null ? doctors[editIndex].photo : null),
hospitals:tempSchedules
};

if(editIndex!==null){
doctors[editIndex]=doctor;
editIndex=null;
}else{
doctors.push(doctor);
}

save();
alert("Saved!");
clearForm();
}

if(file){
let reader=new FileReader();
reader.onload=e=>finalize(e.target.result);
reader.readAsDataURL(file);
}else{
finalize(null);
}
}

function editDoctor(i){
let d=doctors[i];
editIndex=i;

// fill basic info
document.getElementById("name").value=d.name;
document.getElementById("category").value=d.category;

// clone schedules safely
tempSchedules = JSON.parse(JSON.stringify(d.hospitals || []));

// render schedules immediately
renderTempSchedules();

// go to Add tab
showTab("add");
}

function cancelEdit(){
editIndex=null;
clearForm();
}

function clearForm(){
document.getElementById("name").value="";
document.getElementById("category").value="";
document.getElementById("profilePic").value="";

tempSchedules=[];
renderTempSchedules();
}

/* ================= SEARCH ================= */

function searchDoctors(){
let name=document.getElementById("searchName").value.toLowerCase();
let category=document.getElementById("searchCategory").value.toLowerCase();
let hospital=document.getElementById("searchHospital").value;
let day=document.getElementById("searchDay").value;

let filtered=doctors.filter(d=>{
if(name && !d.name.toLowerCase().includes(name)) return false;
if(category){
let doctorCategory = (d.category || "").toLowerCase().trim();
let searchCategory = category.trim();

if(!doctorCategory.includes(searchCategory)) return false;
}
if(hospital){
let has=(d.hospitals||[]).some(h=>h.name.toLowerCase()===hospital);
if(!has) return false;
}

// NEW: check if schedule matches day (if day selected)
if(day){
let hasDay=(d.hospitals||[]).some(h=>h.schedule && h.schedule[day]);
if(!hasDay) return false;
}

return true;
}).sort((a,b)=>a.name.localeCompare(b.name));

document.getElementById("results").innerHTML =
filtered.map(d=>{
let realIndex=doctors.indexOf(d);

let html=(d.hospitals||[])
.filter(h => !hospital || h.name.toLowerCase() === hospital)
.map(h=>{
let sched=Object.entries(h.schedule||{})
.filter(s=>!day || s[0]===day);

if(!sched.length) return "";

return `
<div>
<b>🏥 ${h.name}</b><br>
${sched.map(s=>`${s[0]}: ${s[1]}`).join("<br>")}
</div>
`;
}).join("");

return `
<div class="doc">
<img src="${d.photo || 'https://via.placeholder.com/70'}"
onclick="zoomImage(this.src)"
style="width:70px;height:70px;border-radius:50%;object-fit:cover;cursor:pointer;">

<div class="info">
<div class="category">${d.category||"General"}</div>
<div class="name">${d.name}</div>
<div class="hospital">
${html || "<i>No schedule available</i>"}
</div>
</div>

<div class="iconBtn">
<button onclick="editDoctor(${realIndex})">✏️</button>
<button onclick="deleteDoctor(${realIndex})">🗑</button>
</div>
</div>`;
}).join("") || "<p>No results found</p>";
}
 


/* ================= VIEW ================= */
function saveTempSchedule(hospital){

let schedule={};

days.forEach(day=>{
let start=document.getElementById("start_"+day)?.value;
let end=document.getElementById("end_"+day)?.value;

if(start && end){
schedule[day]=formatTime(start)+" - "+formatTime(end);
}
});

if(Object.keys(schedule).length===0){
return alert("Enter at least one schedule");
}

tempSchedules.push({
name:hospital,
schedule:schedule
});

// clear builder UI after save
document.getElementById("tempSchedules").innerHTML="";

renderTempSchedules();
}
    function formatTime(t){
let [h,m]=t.split(":");
h=parseInt(h);

let ampm = h >= 12 ? "PM" : "AM";
h = h % 12 || 12;

return `${h}:${m} ${ampm}`;
}
    
function renderView(){
let day=document.getElementById("viewDay").value;

let html=doctors.map(d=>{

let entries=(d.hospitals||[]).map(h=>{
if(h.schedule[day]){
return `
<div style="margin-top:6px;">
<div><b>🏥 ${h.name}</b></div>
<div>${day}: ${h.schedule[day]}</div>
</div>
`;
}
return "";
}).join("");

if(!entries) return "";

return `
<div class="doc">
<img src="${d.photo || 'https://via.placeholder.com/70'}"
style="width:70px;height:70px;border-radius:50%;object-fit:cover;">

<div class="info">

<div class="badge">${d.category || "General"}</div>

<div class="name">${d.name}</div>

<div class="hospital">
${entries}
</div>

</div>
</div>
`;
}).join("");

document.getElementById("viewBox").innerHTML =
html || "<p>No schedules for this day</p>";
}

/* ================= REPORT ================= */

function openFullReport(){
let win=window.open("","_blank");

let content=`
<html>
<head>
<title>Report</title>
<style>
body{font-family:sans-serif;padding:20px;}
h2{border-bottom:2px solid #000;}
</style>
</head>
<body>
<h1>Doctor Schedule Report</h1>
`;

doctors.forEach(d=>{
content+=`<h2>${d.name} (${d.category})</h2>`;

(d.hospitals||[]).forEach(h=>{
content+=`<b>${h.name}</b><br>`;
content+=Object.entries(h.schedule||{})
.map(s=>`${s[0]}: ${s[1]}`).join("<br>");
content+="<br><br>";
});
});

content+=`
<script>window.print()<\/script>
</body></html>`;

win.document.write(content);
win.document.close();
}

/* ================= SWIPE ================= */

let startX=0;

document.addEventListener("touchstart",e=>{
if(e.target.closest(".doc")){
startX=e.touches[0].clientX;
}
});

document.addEventListener("touchend",e=>{
let card=e.target.closest(".doc");
if(!card) return;

let endX=e.changedTouches[0].clientX;
let diff=startX-endX;

if(diff>50) card.classList.add("show-actions");
if(diff<-50) card.classList.remove("show-actions");
});

/* ================= DELETE ================= */

function deleteDoctor(i){
if(confirm("Delete this doctor?")){
doctors.splice(i,1);
save();
searchDoctors();
renderView();
}
}

/* ================= IMAGE ================= */

function zoomImage(src){
document.getElementById("modalImg").src=src;
document.getElementById("imgModal").style.display="flex";
}

document.getElementById("imgModal").onclick=function(){
this.style.display="none";
}
function convertTo24(timeStr){
if(!timeStr) return "";

let [time, ampm] = timeStr.split(" ");
let [h, m] = time.split(":");

h = parseInt(h);

if(ampm === "PM" && h !== 12) h += 12;
if(ampm === "AM" && h === 12) h = 0;

return `${h.toString().padStart(2,"0")}:${m}`;
}

/* ================= PWA ================= */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
